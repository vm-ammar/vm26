// ==========================================
// تحميل البيانات من Google Sheets
// ==========================================
async function loadDataFromSheets() {
    var statusDiv = document.getElementById("updateStatus");
    statusDiv.innerHTML = "🔄 جاري تحميل البيانات...";
    
    try {
        // تحميل بيانات اللاعبين
        var playersUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE_PLAYERS}?key=${API_KEY}`;
        var playersResponse = await fetch(playersUrl);
        var playersData = await playersResponse.json();
        
        // تحميل نتائج المباريات
        var resultsUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE_RESULTS}?key=${API_KEY}`;
        var resultsResponse = await fetch(resultsUrl);
        var resultsData = await resultsResponse.json();
        
        // معالجة بيانات اللاعبين
        var newPlayers = {};
        if(playersData.values && playersData.values.length > 1){
            for(var i=1;i<playersData.values.length;i++){
                var row = playersData.values[i];
                var playerName = row[0];
                if(!playerName) continue;
                var totalGoals = row[1] ? parseInt(row[1]) : null;
                var tipsJson = {};
                try {
                    if(row[2] && row[2] !== "{}") tipsJson = JSON.parse(row[2]);
                } catch(e) { tipsJson = {}; }
                newPlayers[playerName] = { tips: tipsJson, totalGoals: totalGoals };
            }
        }
        
        // إذا كان الجدول فارغاً، نستخدم localStorage
        if(Object.keys(newPlayers).length === 0){
            var backup = localStorage.getItem("vm_data_backup");
            if(backup){
                var backupData = JSON.parse(backup);
                newPlayers = backupData.players || {};
            }
        }
        allPlayers = newPlayers;
        
        // معالجة نتائج المباريات
        var newResults = {};
        for(var i=0;i<72;i++) newResults[i] = null;
        if(resultsData.values && resultsData.values.length > 1){
            for(var i=1;i<resultsData.values.length;i++){
                var row = resultsData.values[i];
                var matchId = parseInt(row[0]);
                var result = row[1];
                if(!isNaN(matchId) && matchId>=0 && matchId<72){
                    newResults[matchId] = result;
                }
            }
        }
        actualResults = newResults;
        
        statusDiv.innerHTML = "✅ تم تحميل البيانات";
        statusDiv.className = "update-status success";
        setTimeout(function(){
            statusDiv.innerHTML = "🟢 جاهز";
            statusDiv.className = "update-status";
        }, 2000);

        console.error("خطأ في التحميل:", error);
        statusDiv.innerHTML = "❌ خطأ في التحميل - استخدم التخزين المحلي";
        statusDiv.className = "update-status error";
        // محاولة التحميل من localStorage
        var backup = localStorage.getItem("vm_data_backup");
        if(backup){
            var backupData = JSON.parse(backup);
            allPlayers = backupData.players || {};
            actualResults = backupData.results || {};
            updateUI();
        }
    }
}

async function savePlayerToSheets(playerName, playerData) {
    try {
        // البحث عن الصف الموجود
        var getUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE_PLAYERS}?key=${API_KEY}`;
        var getResponse = await fetch(getUrl);
        var getData = await getResponse.json();
        
        var rowIndex = -1;
        var rows = getData.values || [];
        for(var i=1;i<rows.length;i++){
            if(rows[i][0] === playerName){
                rowIndex = i;
                break;
            }
        }
        
        var tipsJson = JSON.stringify(playerData.tips || {});
        var totalGoals = playerData.totalGoals || "";
        
        var body = {
            values: [[playerName, totalGoals, tipsJson, new Date().toISOString()]],
            majorDimension: "ROWS"
        };
        
        var url;
        if(rowIndex !== -1){
            // تحديث صف موجود
            url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Sheet1!A${rowIndex+1}:D${rowIndex+1}?key=${API_KEY}&valueInputOption=RAW`;
        } else {
            // إضافة صف جديد
            var newRow = (rows.length + 1).toString();
            url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Sheet1!A${newRow}:D${newRow}?key=${API_KEY}&valueInputOption=RAW`;
        }
        
        await fetch(url, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        
        console.log("تم حفظ اللاعب:", playerName);
    } catch(error){
        console.log("خطأ في حفظ اللاعب:", error);
    }
}

async function saveAllPlayersToSheets() {
    for(var name in allPlayers){
        await savePlayerToSheets(name, allPlayers[name]);

async function saveResultsToSheets() {
    var rows = [["MatchId","Result"]];
    for(var i=0;i<72;i++){
        if(actualResults[i]){
            rows.push([i.toString(), actualResults[i]]);
        }

    var body = { values: rows, majorDimension: "ROWS" };
    
    try {

function calculatePoints(playerData){
    var total=0;
    var tips=playerData.tips||{};
    for(var idx=0;idx<allMatches.length;idx++){
        var tip=tips["match_"+idx]||"";
        var actual=actualResults[idx];
        if(actual && tip.toLowerCase()===actual.toLowerCase()) total++;
    }
    return total;
}

function getTipClass(tip,matchId){
    var actual=actualResults[matchId];
    if(!actual) return 'tip-pending';
    return tip.toLowerCase()===actual.toLowerCase()?'tip-correct':'tip-wrong';
}

function updateUI(){
    var selector=document.getElementById("publicPlayerSelector");
    var players=Object.keys(allPlayers);
    var optionsHtml='<option value="">-- Välj spelare --</option>';

        optionsHtml+='<option value="'+players[p]+'" '+(currentViewPlayer===players[p]?'selected':'')+'>'+players[p]+'</option>';
    }
    selector.innerHTML=optionsHtml;
    
    // تحديث قائمة الاستيراد
    var importSelect=document.getElementById("importPlayerSelect");
    var importHtml='<option value="">-- Välj spelare --</option>';
    for(var ip=0;ip<players.length;ip++){
        importHtml+='<option value="'+players[ip]+'">'+players[ip]+'</option>';
    }
    importSelect.innerHTML=importHtml;
    
    selector.onchange=function(){
        currentViewPlayer=this.value||null;
        updateUI();
    };
    
    var pointsArray=[];
    for(var pp=0;pp<players.length;pp++){
        pointsArray.push({name:players[pp],points:calculatePoints(allPlayers[players[pp]])});
    }
    pointsArray.sort(function(a,b){return b.points-a.points;});
    
    var sidebarHtml='';
    for(var sp=0;sp<pointsArray.length;sp++){
        var activeClass=(currentViewPlayer===pointsArray[sp].name)?'active':'';
        sidebarHtml+='<div class="player-list-item '+activeClass+'" data-name="'+pointsArray[sp].name+'"><span>'+pointsArray[sp].name+'</span><span>'+pointsArray[sp].points+' p</span></div>';
    }
    document.getElementById("playersListSidebar").innerHTML=sidebarHtml;
    
    var playerItems=document.querySelectorAll("#playersListSidebar .player-list-item");
    for(var i=0;i<playerItems.length;i++){
        playerItems[i].onclick=function(){
            currentViewPlayer=this.getAttribute("data-name");
            updateUI();
        };
    }
    
    var top5Html='';
    for(var tp=0;tp<Math.min(5,pointsArray.length);tp++){
        top5Html+='<div class="top-player-item"><span>'+(tp+1)+'. '+pointsArray[tp].name+'</span><span>'+pointsArray[tp].points+' p</span></div>';
    }
    document.getElementById("topPlayersList").innerHTML=top5Html;
    
    if(currentViewPlayer && allPlayers[currentViewPlayer] && allPlayers[currentViewPlayer].totalGoals){
        document.getElementById("totalGoalsValue").textContent=allPlayers[currentViewPlayer].totalGoals;
        document.getElementById("selectedPlayerInfo").textContent=currentViewPlayer+' - '+calculatePoints(allPlayers[currentViewPlayer])+' p';
    }else{
        document.getElementById("totalGoalsValue").textContent="-";
        document.getElementById("selectedPlayerInfo").textContent="";
    }
    
    var playerData=currentViewPlayer?allPlayers[currentViewPlayer]:null;
    var html='<table class="match-table"><thead><tr><th>#</th><th>Datum</th><th>Tid</th><th>Grupp</th><th>Lag 1</th><th></th><th>Lag 2</th><th>Tips</th><th>Resultat</th></tr></thead><tbody>';
    for(var mi=0;mi<allMatches.length;mi++){
        var m=allMatches[mi];
        var tip=(playerData && playerData.tips && playerData.tips["match_"+m.id])?playerData.tips["match_"+m.id]:"";
        var tipClass='no-tips';
        if(tip){
            var actual=actualResults[m.id];
            if(!actual) tipClass='tip-pending';
            else if(tip.toLowerCase()===actual.toLowerCase()) tipClass='tip-correct';
            else tipClass='tip-wrong';
        }
        var resultText=actualResults[m.id]?'<span class="status-played">✅ '+actualResults[m.id].toUpperCase()+'</span>':'<span class="status-upcoming">⏳ Kommande</span>';
        html+='<tr><td style="text-align:center;">'+m.matchNumber+'</td><td style="white-space:nowrap;">'+m.datum+'</td><td style="white-space:nowrap;">'+m.time+'</td><td style="text-align:center;">'+m.group+'</td><td>'+m.lag1+'</td><td style="text-align:center;">vs</td><td>'+m.lag2+'</td><td class="'+tipClass+'" style="text-align:center;">'+(tip?tip.toUpperCase():'-')+'</td><td>'+resultText+'</td></tr>';
    }
    html+='</tbody></table>';
    document.getElementById("allMatchesContainer").innerHTML=html;
}

function openManualUpdatePopup(){
    var popup=document.getElementById("manualResultPopup");
    var listContainer=document.getElementById("manualResultsList");
    var html='';
    for(var i=0;i<allMatches.length;i++){
        var match=allMatches[i];
        var currentResult=actualResults[i]||'';
        html+='<div class="manual-result-row"><span style="flex:1;">'+match.matchNumber+'. '+match.lag1+' vs '+match.lag2+'</span><select id="manual_result_'+i+'"><option value="" '+(currentResult===''?'selected':'')+'>- (لم تحدد بعد)</option><option value="1" '+(currentResult==='1'?'selected':'')+'>1 ('+match.lag1+')</option><option value="X" '+(currentResult==='X'?'selected':'')+'>X (Oavgjort)</option><option value="2" '+(currentResult==='2'?'selected':'')+'>2 ('+match.lag2+')</option></select></div>';
    }
    listContainer.innerHTML=html;
    popup.classList.add("active");
}

function saveManualResults(){
    var hasChanges=false;
    for(var i=0;i<allMatches.length;i++){
        var select=document.getElementById("manual_result_"+i);
        if(select){
            var newResult=select.value;
            if(actualResults[i]!==newResult){
                actualResults[i]=(newResult===""?null:newResult);
                hasChanges=true;
            }
        }
    }
    if(hasChanges){
        saveResultsToSheets();
        saveDataLocally();
        updateUI();
        document.getElementById("updateStatus").innerHTML="✅ تم التحديث!";
        document.getElementById("updateStatus").className="update-status success";
        setTimeout(function(){
            document.getElementById("updateStatus").innerHTML="🟢 جاهز";
            document.getElementById("updateStatus").className="update-status";
        },3000);
        alert("✅ النتائج تم حفظها بنجاح!");
    }else{
        alert("ℹ️ لا توجد تغييرات جديدة");
    }
    document.getElementById("manualResultPopup").classList.remove("active");
}

function manualUpdate(){
    openManualUpdatePopup();
}

function exportCompletePage(){
    isLoggedIn=false;
    document.getElementById("adminBar").classList.remove("active");
    document.getElementById("importBar").classList.remove("active");
    updateUI();
    setTimeout(function(){
        var htmlContent=document.documentElement.outerHTML;
        var blob=new Blob([htmlContent],{type:'text/html'});
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download="VM_tips_public_"+new Date().toISOString().slice(0,19).replace(/:/g,'-')+".html";
        a.click();
        URL.revokeObjectURL(a.href);
        alert("✅ تم تسجيل الخروج وتصدير الصفحة!");
    },100);
}

function login(){
    if(document.getElementById("adminPassword").value===ADMIN_PASSWORD){
        isLoggedIn=true;
        document.getElementById("adminBar").classList.add("active");
        document.getElementById("importBar").classList.add("active");
        document.getElementById("adminLoginPopup").style.display="none";
        updateUI();
        alert("✅ Inloggad som admin!");
    }else{
        alert("❌ Fel lösenord!");
    }
}

function logout(){
    isLoggedIn=false;
    document.getElementById("adminBar").classList.remove("active");
    document.getElementById("importBar").classList.remove("active");
    updateUI();
    alert("✅ Utloggad!");
}

function addNewPlayer(){
    var name=prompt("Ange spelarens namn:");
    if(name && !allPlayers[name]){
        allPlayers[name]={tips:{},totalGoals:null};
        saveDataLocally();
        savePlayerToSheets(name, allPlayers[name]);
        updateUI();
        alert("✅ Spelaren \""+name+"\" har lagts till!");
        // تحديث قائمة الاستيراد
        var importSelect=document.getElementById("importPlayerSelect");
        var newOption=document.createElement("option");
        newOption.value=name;
        newOption.textContent=name;
        importSelect.appendChild(newOption);
    }else if(name){
        alert("❌ Finns redan!");
    }
}

function removeSelectedPlayer(){
    if(!currentViewPlayer){
        alert("❌ Ingen spelare är vald! Välj en spelare från listan först.");
        return;
    }
    if(confirm("Är du säker på att du vill ta bort spelaren \""+currentViewPlayer+"\"?")){
        delete allPlayers[currentViewPlayer];
        if(currentViewPlayer===currentViewPlayer) currentViewPlayer=null;
        saveDataLocally();
        updateUI();
        alert("✅ Spelaren har tagits bort.");
    }
}

async function importExcelFile(){
    var player=document.getElementById("importPlayerSelect").value;
    var file=document.getElementById("multiImport").files[0];
    if(!player){alert("Välj spelare först!");return;}
    if(!file){alert("Välj fil");return;}
    var reader=new FileReader();
    reader.onload=function(e){
        var workbook=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        var sheet=workbook.Sheets[workbook.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(sheet,{header:1});
        var tips={},totalGoals=null;
        if(rows[2] && rows[2][5]) totalGoals=parseInt(rows[2][5]);
        var startRow=-1;
        for(var i=0;i<rows.length;i++) if(rows[i][0]===1 || rows[i][0]==="1"){startRow=i;break;}
        if(startRow===-1){alert("Kunde inte hitta matchdata");return;}
        for(var ri=startRow;ri<startRow+72 && ri<rows.length;ri++){
            var row=rows[ri];
            if(!row) continue;
            var matchNum=parseInt(row[0]);
            if(isNaN(matchNum) || matchNum<1 || matchNum>72) continue;
            var tip=row[5]?row[5].toString().toLowerCase():"";
            if(tip.match(/^[1x2]$/)) tips["match_"+(matchNum-1)]=tip;
        }
        if(!allPlayers[player]) allPlayers[player]={tips:{},totalGoals:null};
        allPlayers[player].tips=tips;
        if(totalGoals) allPlayers[player].totalGoals=totalGoals;
        saveDataLocally();
        savePlayerToSheets(player, allPlayers[player]);
        updateUI();
        alert("Importerat "+Object.keys(tips).length+" tips för "+player);
    };
    reader.readAsArrayBuffer(file);
    document.getElementById("multiImport").value="";
    document.getElementById("selectedFilesCount").textContent="Ingen fil vald";
}

document.addEventListener("DOMContentLoaded",function(){
    loadData();
    
    var timer=null;
    document.getElementById("mainHeader").onclick=function(){
        var popup=document.getElementById("adminLoginPopup");
        if(popup.style.display==="block"){
            popup.style.display="none";
            clearTimeout(timer);
        }else{
            popup.style.display="block";
            timer=setTimeout(function(){popup.style.display="none";},30000);
        }
    };
    
    document.getElementById("loginBtn").onclick=login;
    document.getElementById("logoutButton").onclick=logout;
    document.getElementById("addPlayerBtn").onclick=addNewPlayer;
    document.getElementById("removePlayerBtn").onclick=removeSelectedPlayer;
    document.getElementById("exportPageBtn").onclick=exportCompletePage;
    document.getElementById("manualUpdateBtn").onclick=manualUpdate;
    document.getElementById("closeManualPopup").onclick=function(){document.getElementById("manualResultPopup").classList.remove("active");};
    document.getElementById("saveManualResults").onclick=saveManualResults;
    document.getElementById("lockTournamentBtn").onclick=function(){if(confirm("Lås tävlingen?")){isLocked=true;saveDataLocally();alert("Låst!");}};
    document.getElementById("multiImport").onchange=function(e){
        var c=e.target.files.length;
        document.getElementById("selectedFilesCount").textContent=c===0?"Ingen fil vald":(c===1?"1 fil vald":c+" filer valda");
    };
    document.getElementById("importFilesBtn").onclick=importExcelFile;
    document.getElementById("publicPlayerSelector").onchange=function(e){
        currentViewPlayer=e.target.value||null;
        updateUI();
    };
});
</script>
